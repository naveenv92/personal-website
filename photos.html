        <script>
            (function () {
                const savedTheme = localStorage.getItem("theme");
                const prefersDark = window.matchMedia(
                    "(prefers-color-scheme: dark)",
                ).matches;
                if (savedTheme === "dark" || (!savedTheme && prefersDark)) {
                    document.documentElement.setAttribute("data-theme", "dark");
                }
            })();
        </script>

        <main>
            <header class="page-header">
                <h1>Travel Photos</h1>
            </header>

            <!-- World Map -->
            <div id="travel-map" class="travel-map"></div>

            <!-- Location Info (shown when a pin is clicked) -->
            <div id="location-info" class="location-info">
                <h2 id="location-title"></h2>
                <p id="location-date" class="location-date"></p>
                <p id="location-description"></p>
            </div>

            <!-- Placeholder when no location is selected -->
            <div id="location-placeholder" class="location-placeholder">
                Click on a pin on the map to see photos from that location
            </div>

            <!-- Photo Grid (populated dynamically) -->
            <div id="photo-grid" class="photo-grid hidden"></div>
        </main>

        <!-- Lightbox -->
        <div class="lightbox">
            <button class="lightbox-close" aria-label="Close lightbox">
                &times;
            </button>
            <button
                class="lightbox-nav lightbox-prev"
                aria-label="Previous photo"
            >
                &#10094;
            </button>
            <button class="lightbox-nav lightbox-next" aria-label="Next photo">
                &#10095;
            </button>
            <div class="lightbox-content">
                <img src="" alt="" />
                <p class="lightbox-caption"></p>
            </div>
        </div>

        <footer class="footer">
